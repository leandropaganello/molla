<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>System Critical - Herr Molla</title>
</head>
<body style="background-color: black; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden;">

    <div id="terminal" style="width: 80%; max-width: 600px; text-align: center;">
        <h1 style="font-size: 1.5rem; border-bottom: 1px solid #00ff00; padding-bottom: 10px; text-transform: uppercase;">Remote Zugriff: Target_Molla</h1>
        
        <!-- Platzhalter für das Bild -->
        <div id="image-container" style="margin: 20px auto; width: 150px; height: 150px; border: 2px solid #00ff00; display: flex; align-items: center; justify-content: center; background-color: #111;">
            <!-- Ersetze 'dein-bild.jpg' durch den echten Dateinamen, falls vorhanden -->
            <img src="molla.jpg" alt="User Profile" style="max-width: 100%; max-height: 100%; filter: grayscale(1) contrast(1.5) brightness(0.8);">
        </div>

        <p id="log-text" style="height: 1.2em;">Initialisiere Exploit...</p>
        
        <!-- Progress Bar -->
        <div style="width: 100%; border: 1px solid #00ff00; height: 25px; margin-top: 10px; position: relative; overflow: hidden;">
            <div id="progress-bar" style="background-color: #00ff00; width: 0%; height: 100%; transition: width 0.15s ease-out;"></div>
        </div>
        
        <p id="status" style="margin-top: 10px; font-size: 0.9rem;">Hacke Herr Mollas Admin-Passwort: 0%</p>
    </div>

    <script>
        const logText = document.getElementById('log-text');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status');
        const terminal = document.getElementById('terminal');

        const messages = [
            "Umgehe Informatik-Fachraum-Firewall...",
            "Verschlüssele Herr Mollas Klausur-Ordner...",
            "Sende Noten-Update an das Schulportal...",
            "Aktiviere Webcam-Übertragung (Scherz)...",
            "Lösche 'Molla_Backup_2024'...",
            "Infiltriere Java-Runtime-Environment...",
            "Erstelle permanenten Root-Zugang..."
        ];

        let progress = 0;
        let messageIndex = 0;

        function updateSimulation() {
            if (progress < 100) {
                // Zufälliger Fortschritt
                progress += Math.random() * 3;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = progress + "%";
                statusText.innerText = "Fortschritt: " + Math.floor(progress) + "%";

                // Nachrichten-Wechsel
                if (Math.random() > 0.92 && messageIndex < messages.length) {
                    logText.innerText = messages[messageIndex];
                    messageIndex++;
                }

                setTimeout(updateSimulation, 120);
            } else {
                // Das Finale
                document.body.style.backgroundColor = "#003366"; // Wechselt zu Blau (wie ein Bluescreen)
                terminal.innerHTML = `
                    <div style="padding: 20px; border: 4px solid white; background-color: rgba(0,0,0,0.5);">
                        <h1 style="color: #fff; font-size: 3rem; margin-bottom: 10px;">Alles gelöscht!</h1>
                        <h2 style="color: #00ff00; margin-bottom: 20px;">Viel Spaß, Herr Molla!</h2>
                        <p style="color: white; font-size: 1.2rem;">Das war nur ein kleiner Test meiner JavaScript-Skills.</p>
                        <div style="font-size: 4rem; margin: 20px;">😜</div>
                        <button onclick="location.reload()" style="background: white; border: none; color: #003366; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px;">Zurück zum Unterricht</button>
                    </div>
                `;
            }
        }

        // Start nach kurzer Verzögerung
        setTimeout(updateSimulation, 1500);
    </script>
</body>
</html>
